  <ellipse cx="40" cy="14" rx="6" ry="4"/>
  <line x1="40" y1="10" x2="42" y2="7"/>
  <!-- Hair pin (kanzashi) -->
  <line x1="36" y1="11" x2="46" y2="13"/>
  <circle cx="36" cy="11" r="1.5" fill="#86868B"/>
  <!-- Face -->
  <ellipse cx="40" cy="38" rx="12" ry="11"/>
  <!-- Gentle eyes (softer, slightly curved) -->
  <path d="M33 36 Q35 34.5 37 36"/>
  <path d="M43 36 Q45 34.5 47 36"/>
  <!-- Soft smile -->
  <path d="M35 42 Q40 45 45 42"/>
  <!-- Neck -->
  <line x1="37" y1="49" x2="37" y2="54"/>
  <line x1="43" y1="49" x2="43" y2="54"/>
  <!-- Kimono collar -->
  <path d="M30 54 L37 54 L40 60 L43 54 L50 54"/>
  <!-- Shoulders -->
  <path d="M24 60 L30 54"/>
  <path d="M56 60 L50 54"/>
  <!-- Scroll / clipboard in hand -->
  <rect x="54" y="46" width="6" height="10" rx="1"/>
  <line x1="56" y1="49" x2="58" y2="49"/>
  <line x1="56" y1="51" x2="58" y2="51"/>
  <line x1="56" y1="53" x2="58" y2="53"/>
</svg>
