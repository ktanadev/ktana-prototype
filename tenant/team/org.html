<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organograma — KTANA</title>
  <link rel="stylesheet" href="../../shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    body { min-height: 100vh; background: #F5F5F7; padding: 48px 24px; }
    .container { max-width: 720px; margin: 0 auto; }
    .back { position: fixed; top: 20px; left: 24px; font-family: 'Inter', sans-serif; font-size: 12px; color: #86868B; }
    h1 { font-family: 'Zen Dots', cursive; font-size: 24px; color: #1D1D1F; text-align: center; margin-bottom: 6px; }
    .sub { font-family: 'Satoshi', sans-serif; font-size: 14px; color: #86868B; text-align: center; margin-bottom: 48px; }

    .org { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .org-line { width: 1px; height: 28px; background: rgba(0,0,0,0.08); }
    .org-hline { width: 60%; height: 1px; background: rgba(0,0,0,0.06); position: relative; }

    .node { background: #FFF; border: 1px solid rgba(0,0,0,0.04); border-radius: 14px; padding: 12px 18px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: box-shadow 0.2s; }
    .node:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
    .node-sm { padding: 10px 14px; }
    .node-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #D2D2D7; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .node-avatar span { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; color: #86868B; }
    .node-ceo { border-color: rgba(215,0,48,0.25); }
    .node-ceo span { color: #D70030; }
    .node-name { font-family: 'Satoshi', sans-serif; font-size: 13px; font-weight: 500; color: #1D1D1F; }
    .node-role { font-family: 'Inter', sans-serif; font-size: 11px; color: #86868B; }
    .node-owner { opacity: 0.5; cursor: default; }
    .node-owner:hover { box-shadow: none; }

    .branch { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .dept-label { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #AEAEB2; margin-bottom: 8px; text-align: center; }
  
    /* === COMPACT CHAT ZONE -- Dark Ambient Glow Widget === */
    .chat-zone.compact {
      background: #0A0A0A;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      margin-bottom: 28px;
      padding: 0;
      box-shadow: 0 4px 32px rgba(0,0,0,0.18), 0 0 0 1px rgba(255,255,255,0.04);
    }
    .chat-zone.compact .ambient-glow {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
    }
    .chat-zone.compact .ambient-glow-orb {
      position: absolute; border-radius: 50%; pointer-events: none;
      filter: blur(60px);
    }
    .chat-zone.compact .ambient-glow-orb:nth-child(1) {
      width: 55%; height: 45%;
      top: 0%; left: -10%;
      background: radial-gradient(ellipse at center, rgba(215,0,48,0.22) 0%, transparent 70%);
      animation: orbDriftC1 10s ease-in-out infinite;
    }
    .chat-zone.compact .ambient-glow-orb:nth-child(2) {
      width: 45%; height: 40%;
      top: 20%; right: -10%;
      background: radial-gradient(ellipse at center, rgba(160,15,5,0.18) 0%, transparent 70%);
      animation: orbDriftC2 14s ease-in-out infinite;
    }
    .chat-zone.compact .ambient-glow-orb:nth-child(3) {
      width: 40%; height: 45%;
      bottom: -5%; left: 20%;
      background: radial-gradient(ellipse at center, rgba(220,80,25,0.15) 0%, transparent 70%);
      animation: orbDriftC3 12s ease-in-out infinite;
    }
    @keyframes orbDriftC1 { 0%,100% { transform: translate(0,0); } 33% { transform: translate(8%,6%); } 66% { transform: translate(-4%,-4%); } }
    @keyframes orbDriftC2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-10%,5%); } }
    @keyframes orbDriftC3 { 0%,100% { transform: translate(0,0); } 33% { transform: translate(6%,-6%); } 66% { transform: translate(-5%,3%); } }

    .chat-zone.compact .cmd-inner { position: relative; z-index: 1; padding: 20px 22px 18px; }
    .cmd-label { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #D70030; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .cmd-label .cmd-dot { width: 6px; height: 6px; border-radius: 50%; background: #30D158; animation: pulse-cmd 2s infinite; }
    @keyframes pulse-cmd { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .cmd-messages { max-height: 200px; overflow-y: auto; margin-bottom: 16px; display: flex; flex-direction: column; gap: 10px; }
    .cmd-msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-family: 'Satoshi', sans-serif; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
    .cmd-msg-ai { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); color: #E5E5EA; border-bottom-left-radius: 4px; align-self: flex-start; }
    .cmd-msg-user { background: rgba(215,0,48,0.12); border: 1px solid rgba(215,0,48,0.18); color: #F5F5F7; border-bottom-right-radius: 4px; align-self: flex-end; }
    .cmd-msg-ai .cmd-sender { font-family: 'Inter', sans-serif; font-size: 11px; color: #D70030; font-weight: 500; margin-bottom: 4px; }

    .cmd-shortcuts { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
    .cmd-shortcut { font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 980px; padding: 6px 14px; cursor: pointer; transition: all 0.15s; }
    .cmd-shortcut:hover { background: rgba(215,0,48,0.12); color: #F5F5F7; border-color: rgba(215,0,48,0.25); }

    .cmd-input-outer { position: relative; border-radius: 14px; margin-top: 16px; }
    .cmd-input-glow {
      position: absolute;
      top: 50%; left: 50%;
      width: 110%; height: 180%;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 0;
      filter: blur(30px);
      opacity: 0.65;
      background:
        radial-gradient(ellipse 50% 50% at 30% 40%, rgba(215,0,48,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 45% 50% at 70% 50%, rgba(160,15,5,0.35) 0%, transparent 65%),
        radial-gradient(ellipse 40% 45% at 50% 55%, rgba(220,80,25,0.25) 0%, transparent 60%);
      animation: glowMoveC 8s ease-in-out infinite;
    }
    @keyframes glowMoveC {
      0%   { transform: translate(-50%, -50%) rotate(0deg); }
      25%  { transform: translate(-45%, -53%) rotate(2deg); }
      50%  { transform: translate(-55%, -47%) rotate(-1deg); }
      75%  { transform: translate(-48%, -52%) rotate(1.5deg); }
      100% { transform: translate(-50%, -50%) rotate(0deg); }
    }
    .cmd-input-border-spin {
      position: absolute; inset: -1px; border-radius: 15px; z-index: 1;
      overflow: hidden; pointer-events: none;
    }
    .cmd-input-border-spin::before {
      content: ''; position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: conic-gradient(transparent 30%, rgba(140,10,5,0.6) 38%, rgba(215,0,48,0.8) 42%, rgba(220,80,25,0.5) 48%, transparent 55%, transparent 80%, rgba(180,30,8,0.3) 87%, rgba(215,0,48,0.5) 92%, transparent 97%);
      animation: rotateLine 5s linear infinite;
    }
    @keyframes rotateLine { to { transform: rotate(360deg); } }
    .cmd-input-border-spin::after {
      content: ''; position: absolute;
      inset: 1px; border-radius: 14px;
      background: #111;
    }
    .cmd-input-card {
      background: #111; border-radius: 14px; position: relative; z-index: 2;
      display: flex; flex-direction: column;
    }
    .cmd-input {
      font-family: 'Satoshi', sans-serif; width: 100%;
      padding: 14px 18px 48px; border-radius: 14px;
      border: none; background: transparent;
      font-size: 15px; color: #E5E5EA; outline: none;
      min-height: 56px; max-height: 120px; resize: none;
      box-sizing: border-box;
    }
    .cmd-input::placeholder { color: rgba(255,255,255,0.25); }
    .cmd-input-footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 8px 14px; display: flex; align-items: center; gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .cmd-add-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: all 0.15s; }
    .cmd-add-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }
    .cmd-agent-select { font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 5px 10px; cursor: pointer; appearance: none; -webkit-appearance: none; }
    .cmd-send { margin-left: auto; width: 34px; height: 34px; border-radius: 10px; background: #D70030; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s, background 0.15s; flex-shrink: 0; color: #F5F5F7; }
    .cmd-send:hover { background: #E5003A; }
    .cmd-send:active { transform: scale(0.92); }
    .cmd-typing { display: none; align-items: center; gap: 8px; padding: 6px 0; margin-bottom: 8px; }
    .cmd-typing.active { display: flex; }
    .cmd-typing-dots { display: flex; gap: 4px; }
    .cmd-typing-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(215,0,48,0.4); animation: typingBounceC 1.4s ease infinite; }
    .cmd-typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .cmd-typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounceC { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-3px); } }
    .cmd-typing-text { font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(255,255,255,0.35); }

  </style>
</head>
<body>
  <a href="list.html" class="back">← Equipe</a>
  <div class="container"><div class="gradient-header">
    <h1 class="fade-in">Organograma.</h1>
    <p class="sub fade-in">Hierarquia da sua empresa inteligente.</p>

    <div class="org fade-in">
      <!-- Dono -->
      <div class="node node-owner">
        <div class="node-avatar"><span>J</span></div>
        <div><p class="node-name">Julio</p><p class="node-role">Dono</p></div>
      </div>

      <div class="org-line"></div>

      <!-- CEO -->
      <div class="node" onclick="location.href='../agent/chat.html'">
        <div class="node-avatar node-ceo"><span>A</span></div>
        <div><p class="node-name">Akira</p><p class="node-role">CEO</p></div>
      </div>

      <div class="org-line"></div>
      <div class="org-hline"></div>
      <div style="height: 16px;"></div>

      <!-- Branches -->
      <div class="branch">
        <div style="text-align: center;">
          <p class="dept-label">FINANCEIRO</p>
          <div class="node node-sm" onclick="location.href='../agent/chat.html'">
            <div class="node-avatar"><span>Y</span></div>
            <div><p class="node-name">Yuki</p><p class="node-role">Controller</p></div>
          </div>
        </div>

        <div style="text-align: center;">
          <p class="dept-label">ADMINISTRATIVO</p>
          <div class="node node-sm" onclick="location.href='../agent/chat.html'">
            <div class="node-avatar"><span>H</span></div>
            <div><p class="node-name">Hana</p><p class="node-role">Secretaria</p></div>
          </div>
        </div>

        <div style="text-align: center;">
          <p class="dept-label">PROJETOS</p>
          <div class="node node-sm" onclick="location.href='../agent/chat.html'">
            <div class="node-avatar"><span>H</span></div>
            <div><p class="node-name">Haruki</p><p class="node-role">PM</p></div>
          </div>
        </div>

        <div style="text-align: center;">
          <p class="dept-label" style="color: #D70030;">+ NOVO</p>
          <div class="node node-sm" style="border-style:dashed; border-color:#D2D2D7;" onclick="location.href='hire-level.html'">
            <div style="font-family:'Inter',sans-serif; font-size:12px; color:#86868B; padding: 4px 8px;">+ Contratar samurai</div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="../../shared-nav.js?v=1774999999"></script>
</body>
