<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Revisar contratacao — KTANA</title><link rel="stylesheet" href="../../shared.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">

<body><a href="hire-config.html" class="back">← Config</a><div class="container fade-in">
<h1>Contratar.</h1>
<p class="sub">Revise antes de ativar seu novo samurai.</p>
<div class="card"><p class="card-label">Resumo</p>
<div class="row"><span class="row-l">Nome</span><span class="row-v">Rin</span></div>
<div class="row"><span class="row-l">Cargo</span><span class="row-v">Analista Fiscal</span></div>

<div class="row"><span class="row-l">Atribuicoes</span><span class="row-v">6 ativas</span></div>
<div class="row"><span class="row-l">Rotinas</span><span class="row-v">3 configuradas</span></div>
</div>
<button class="btn-hire" onclick="this.textContent='Samurai contratado'; this.style.opacity='0.5'; setTimeout(()=>location.href='list.html',1500)">Contratar Rin</button>
