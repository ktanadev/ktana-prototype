<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Conectar WhatsApp — KTANA</title><link rel="stylesheet" href="../../shared.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
<style>body{min-height:100vh;background:#F5F5F7;display:flex;align-items:center;justify-content:center;padding:48px 24px}.container{max-width:420px;text-align:center;width:100%}h1{font-family:'Satoshi',sans-serif;font-size:20px;font-weight:600;color:#1D1D1F;margin-bottom:8px}.desc{font-family:'Satoshi',sans-serif;font-size:14px;color:#86868B;line-height:1.6;margin-bottom:32px}.qr-box{width:220px;height:220px;margin:0 auto 24px;background:#FFF;border-radius:20px;border:1px solid rgba(0,0,0,0.04);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:12px;color:#AEAEB2}.steps{text-align:left;max-width:280px;margin:0 auto}.steps li{font-family:'Satoshi',sans-serif;font-size:13px;color:#6E6E73;padding:6px 0;line-height:1.5}.btn-done{font-family:'Inter',sans-serif;margin-top:24px;padding:14px 40px;border-radius:14px;background:#1D1D1F;color:#F5F5F7;font-size:14px;font-weight:500;border:none;cursor:pointer}.back{font-family:'Inter',sans-serif;font-size:12px;color:#86868B;margin-top:16px;display:inline-block}</style></head>
<body><div class="container fade-in">
<h1>Conectar WhatsApp</h1>
<p class="desc">Escaneie o QR code. Igual WhatsApp Web.</p>
<div class="qr-box">[QR Code]</div>
<ol class="steps">
<li>Abra o WhatsApp no celular</li>
<li>Toque em <strong>Aparelhos conectados</strong></li>
<li>Escaneie este codigo</li>
</ol>
<button class="btn-done" onclick="this.textContent='Conectado'; this.style.background='#30D158'; setTimeout(()=>location.href='connect.html',1000)">Ja escaneei</button>
<br><a href="connect.html" class="back">← Voltar</a>
</div></body></html>
