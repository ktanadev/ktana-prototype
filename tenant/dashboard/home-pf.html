<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Meu dia — KTANA</title><link rel="stylesheet" href="../../shared.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
<style>body{min-height:100vh;background:#F5F5F7}.nav{position:sticky;top:0;z-index:50;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(245,245,247,0.72);backdrop-filter:saturate(180%) blur(20px);border-bottom:0.5px solid rgba(0,0,0,0.06)}.nav-inner{width:100%;max-width:720px;padding:0 24px;display:flex;align-items:center;justify-content:space-between}.nav-logo{font-family:'Zen Dots',cursive;font-size:14px;color:#D70030}.nav-links a{font-family:'Inter',sans-serif;font-size:12px;color:#1D1D1F;opacity:0.4;margin-left:24px}.nav-links a.active{opacity:1}.main{max-width:720px;margin:0 auto;padding:40px 24px 80px}.greeting h1{font-family:'Satoshi',sans-serif;font-size:24px;font-weight:700;color:#1D1D1F;margin-bottom:4px}.greeting p{font-family:'Satoshi',sans-serif;font-size:14px;color:#86868B;margin-bottom:32px}.card{background:#FFF;border-radius:20px;border:1px solid rgba(0,0,0,0.04);padding:24px;margin-bottom:12px}.card-label{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#D70030;margin-bottom:14px}.checkin{font-family:'Satoshi',sans-serif;font-size:15px;color:#1D1D1F;line-height:1.6;padding:16px;background:#F5F5F7;border-radius:14px;margin-bottom:12px}.checkin-from{font-family:'Inter',sans-serif;font-size:11px;color:#86868B;margin-top:4px}.meta-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.03)}.meta-row:last-child{border-bottom:none}.meta-label{font-family:'Satoshi',sans-serif;font-size:13px;color:#86868B}.meta-value{font-family:'Inter',sans-serif;font-size:13px;color:#1D1D1F}.areas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.area-card{background:#F5F5F7;border-radius:14px;padding:16px;text-align:center;cursor:pointer;transition:box-shadow 0.2s}.area-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.04)}.area-icon{font-size:20px;margin-bottom:6px}.area-name{font-family:'Satoshi',sans-serif;font-size:12px;font-weight:500;color:#1D1D1F}.area-status{font-family:'Inter',sans-serif;font-size:11px;color:#86868B;margin-top:2px}.feed-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.03)}.feed-item:last-child{border-bottom:none}.feed-time{font-family:'Inter',sans-serif;font-size:11px;color:#AEAEB2;width:36px;flex-shrink:0}.feed-agent{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:#86868B;width:56px;flex-shrink:0}.feed-desc{font-family:'Satoshi',sans-serif;font-size:13px;color:#86868B}</style></head>
