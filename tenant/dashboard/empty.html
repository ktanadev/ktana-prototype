<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — KTANA</title>
  <link rel="stylesheet" href="../../shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    body { min-height: 100vh; background: #F5F5F7; }
    .main { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
    .greeting h1 { font-family: 'Satoshi', sans-serif; font-size: 24px; font-weight: 700; color: #1D1D1F; margin-bottom: 4px; }
    .greeting p { font-family: 'Satoshi', sans-serif; font-size: 14px; color: #86868B; margin-bottom: 40px; }

    .empty { text-align: center; padding: 80px 0; }
    .empty-icon { width: 64px; height: 64px; border-radius: 20px; background: rgba(215,0,48,0.04); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .empty-icon span { font-family: 'Zen Dots', cursive; font-size: 20px; color: #D70030; }
    .empty h2 { font-family: 'Satoshi', sans-serif; font-size: 18px; font-weight: 600; color: #1D1D1F; margin-bottom: 8px; }
    .empty p { font-family: 'Satoshi', sans-serif; font-size: 14px; color: #86868B; line-height: 1.6; max-width: 360px; margin: 0 auto 24px; }
    .empty-hint { font-family: 'Inter', sans-serif; font-size: 12px; color: #AEAEB2; margin-top: 16px; }

    .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 40px; }
    .team-card { background: #FFF; border-radius: 16px; border: 1px solid rgba(0,0,0,0.04); padding: 16px; text-align: center; }
    .team-avatar { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #D2D2D7; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
    .team-avatar span { font-family: 'Inter', sans-serif; font-size: 12px; color: #86868B; }
    .team-name { font-family: 'Satoshi', sans-serif; font-size: 13px; font-weight: 500; color: #1D1D1F; }
    .team-role { font-family: 'Inter', sans-serif; font-size: 11px; color: #86868B; }
    .team-status { font-family: 'Inter', sans-serif; font-size: 11px; color: #AEAEB2; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .team-status::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: #FF9F0A; }
  </style>
</head>
<body>

<script src="../../shared-nav.js"></script>
