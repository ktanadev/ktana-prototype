<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprovacoes — KTANA</title>
  <link rel="stylesheet" href="../../shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    body { min-height: 100vh; background: #F5F5F7; display: flex; flex-direction: column; }

    .nav { position: sticky; top: 0; z-index: 50; height: 48px; display: flex; align-items: center; justify-content: center; background: rgba(245,245,247,0.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 0.5px solid rgba(0,0,0,0.06); }
    .nav-inner { width: 100%; max-width: 720px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: 'Zen Dots', cursive; font-size: 14px; color: #D70030; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-links a { font-family: 'Inter', sans-serif; font-size: 12px; color: #1D1D1F; opacity: 0.4; transition: opacity 0.15s; }
    .nav-links a:hover, .nav-links a.active { opacity: 1; }

    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }

    .empty-state { text-align: center; max-width: 400px; }

    /* SVG illustration container */
    .empty-illustration { width: 120px; height: 120px; margin: 0 auto 28px; position: relative; }
    .empty-circle { width: 120px; height: 120px; border-radius: 50%; background: rgba(48,209,88,0.04); display: flex; align-items: center; justify-content: center; }
    .empty-circle-inner { width: 80px; height: 80px; border-radius: 50%; background: rgba(48,209,88,0.06); display: flex; align-items: center; justify-content: center; }

    .empty-title { font-family: 'Satoshi', sans-serif; font-size: 20px; font-weight: 700; color: #1D1D1F; margin-bottom: 8px; letter-spacing: -0.01em; }

    .empty-subtitle { font-family: 'Satoshi', sans-serif; font-size: 14px; color: #86868B; line-height: 1.6; margin-bottom: 32px; }

    .empty-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 32px; padding: 20px 0; border-top: 0.5px solid rgba(0,0,0,0.04); border-bottom: 0.5px solid rgba(0,0,0,0.04); }
    .empty-stat { text-align: center; }
    .empty-stat-value { font-family: 'Satoshi', sans-serif; font-size: 22px; font-weight: 700; color: #1D1D1F; }
    .empty-stat-label { font-family: 'Inter', sans-serif; font-size: 11px; color: #AEAEB2; margin-top: 2px; }

    .empty-actions { display: flex; flex-direction: column; align-items: center; gap: 12px; }

    .btn-dashboard { font-family: 'Inter', sans-serif; padding: 14px 32px; border-radius: 14px; background: #1D1D1F; color: #F5F5F7; font-size: 14px; font-weight: 500; border: none; cursor: pointer; min-height: 52px; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-dashboard:hover { background: #000; }
    .btn-dashboard:active { transform: scale(0.98); }

    .link-resolved { font-family: 'Inter', sans-serif; font-size: 12px; color: #86868B; transition: color 0.15s; }
    .link-resolved:hover { color: #1D1D1F; }

    /* Pulse animation on the checkmark */
    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    .pulse { animation: gentlePulse 3s ease-in-out infinite; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="../dashboard/home.html" class="nav-logo">KTANA</a>
      <div class="nav-links">
        <a href="../dashboard/home.html">Painel</a>
        <a href="../settings/general.html">Config</a>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="empty-state fade-in">
      <!-- SVG Checkmark Illustration -->
      <div class="empty-illustration pulse">
        <div class="empty-circle">
          <div class="empty-circle-inner">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <circle cx="18" cy="18" r="16" stroke="#30D158" stroke-width="2" opacity="0.3"/>
              <circle cx="18" cy="18" r="16" stroke="#30D158" stroke-width="2" stroke-dasharray="100.5" stroke-dashoffset="0" stroke-linecap="round">
                <animate attributeName="stroke-dashoffset" from="100.5" to="0" dur="1s" fill="freeze"/>
              </circle>
              <path d="M12 18.5L16 22.5L24 14.5" stroke="#30D158" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <animate attributeName="stroke-dasharray" from="0 30" to="30 0" dur="0.5s" begin="0.6s" fill="freeze"/>
              </path>
            </svg>
          </div>
        </div>
      </div>

      <h2 class="empty-title">Nenhuma aprovacao pendente</h2>
      <p class="empty-subtitle">Seus samurais estao operando dentro da alcada. Voce sera notificado assim que precisarem da sua decisao.</p>

      <!-- Quick stats -->
      <div class="empty-stats">
        <div class="empty-stat">
          <p class="empty-stat-value">23</p>
          <p class="empty-stat-label">Resolvidas este mes</p>
        </div>
        <div class="empty-stat">
          <p class="empty-stat-value">4min</p>
          <p class="empty-stat-label">Tempo medio de resposta</p>
        </div>
        <div class="empty-stat">
          <p class="empty-stat-value">91%</p>
          <p class="empty-stat-label">Taxa de aprovacao</p>
        </div>
      </div>

      <div class="empty-actions">
        <a href="../dashboard/home.html" class="btn-dashboard">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 6l6-4 6 4v7a1 1 0 01-1 1H3a1 1 0 01-1-1V6z" stroke="#F5F5F7" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 14V8h4v6" stroke="#F5F5F7" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Voltar ao painel
        </a>
        <a href="resolved.html" class="link-resolved">Ver aprovacoes resolvidas</a>
      </div>
    </div>
  </main>
</body>
</html>
