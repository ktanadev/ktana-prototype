<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificacao — KTANA</title>
  <link rel="stylesheet" href="../../shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .container { width: 100%; max-width: 380px; text-align: center; }
    .icon { width: 56px; height: 56px; border-radius: 16px; background: rgba(215,0,48,0.06); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .icon svg { width: 24px; height: 24px; stroke: #D70030; fill: none; stroke-width: 1.5; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .desc { font-size: 13px; color: #86868B; margin-bottom: 32px; line-height: 1.6; }
    .code-inputs { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .code-input { width: 48px; height: 56px; border-radius: 12px; border: 1px solid #D2D2D7; background: #FFF; text-align: center; font-size: 20px; font-weight: 600; font-family: inherit; color: #1D1D1F; outline: none; transition: border-color 0.15s; }
    .code-input:focus { border-color: #D70030; }
    .resend { font-size: 12px; color: #86868B; margin-top: 16px; }
    .resend a { color: #D70030; font-weight: 500; cursor: pointer; }
    .back-link { position: fixed; top: 20px; left: 24px; font-size: 12px; color: #86868B; }
  </style>
</head>
<body class="light">
  <a href="login.html" class="back-link">← Voltar</a>

  <div class="container fade-in">
    <div class="icon">
      <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    <h1>Verificacao em dois fatores</h1>
    <p class="desc">Digite o codigo de 6 digitos do seu autenticador.</p>

    <form onsubmit="event.preventDefault(); location.href='../dashboard/home.html';">
      <div class="code-inputs">
        <input type="text" class="code-input" maxlength="1" autofocus oninput="this.nextElementSibling?.focus()">
        <input type="text" class="code-input" maxlength="1" oninput="this.nextElementSibling?.focus()">
        <input type="text" class="code-input" maxlength="1" oninput="this.nextElementSibling?.focus()">
        <input type="text" class="code-input" maxlength="1" oninput="this.nextElementSibling?.focus()">
        <input type="text" class="code-input" maxlength="1" oninput="this.nextElementSibling?.focus()">
        <input type="text" class="code-input" maxlength="1">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 14px; border-radius: 12px;">Verificar</button>
    </form>

    <p class="resend">Nao recebeu? <a>Reenviar codigo</a></p>
  </div>
<script src="../../shared-nav.js"></script>
</body>
</html>
