<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta — KTANA</title>
  <link rel="stylesheet" href="../../shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .signup-container { width: 100%; max-width: 380px; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo h1 { font-size: 20px; margin-bottom: 4px; }
    .logo p { font-size: 13px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 11px; color: #86868B; margin-bottom: 6px; font-weight: 500; }
    .divider { display: flex; align-items: center; gap: 16px; margin: 20px 0; }
    .divider span { font-size: 11px; color: #AEAEB2; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.06); }
    .social-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.06); background: #FFF; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px; font-weight: 500; color: #1D1D1F; cursor: pointer; transition: border-color 0.15s; font-family: inherit; }
    .social-btn:hover { border-color: #D2D2D7; }
    .terms { font-size: 11px; color: #AEAEB2; text-align: center; margin-top: 24px; line-height: 1.6; }
    .terms a { color: #86868B; text-decoration: underline; }
    .login-link { font-size: 13px; color: #86868B; text-align: center; margin-top: 20px; }
    .login-link a { color: #D70030; font-weight: 500; }
    .error-msg { font-size: 11px; color: #FF453A; margin-top: 4px; display: none; }
    .input.error { border-color: #FF453A; }
    .strength { height: 3px; background: rgba(0,0,0,0.04); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: all 0.3s; }
    .back-link { position: fixed; top: 20px; left: 24px; font-size: 12px; color: #86868B; }
    .back-link:hover { color: #1D1D1F; }
  </style>
</head>
<body class="light">
  <a href="../landing.html" class="back-link">← Voltar</a>

  <div class="signup-container fade-in">
    <div class="logo">
      <h1 class="font-display text-brand">KTANA</h1>
      <p class="text-3">Crie sua conta</p>
    </div>

    <!-- Social login -->
    <button class="social-btn" onclick="location.href='verify.html'">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar com Google
    </button>

    <div class="divider"><span>ou</span></div>

    <!-- Form -->
    <form onsubmit="event.preventDefault(); location.href='verify.html';">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" class="input" placeholder="Julio Cesar" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" class="input" placeholder="voce@empresa.com" required>
        <p class="error-msg">Email ja cadastrado</p>
      </div>

      <div class="form-group">
        <label>Telefone (WhatsApp)</label>
        <input type="tel" class="input" placeholder="+55 11 99999-9999">
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" class="input" placeholder="Minimo 8 caracteres" required minlength="8" id="pwd" oninput="updateStrength(this.value)">
        <div class="strength"><div class="strength-fill" id="strength-fill"></div></div>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; padding: 14px; font-size: 14px; border-radius: 12px;">
        Criar conta
      </button>
    </form>

    <p class="terms">
      Ao criar conta, concorda com os <a href="#">Termos de Uso</a> e <a href="#">Politica de Privacidade</a>.
    </p>

    <p class="login-link">
      Ja tem conta? <a href="login.html">Entrar</a>
    </p>
  </div>

  <script>
    function updateStrength(val) {
      const fill = document.getElementById('strength-fill');
      if (val.length < 6) { fill.style.width = '20%'; fill.style.background = '#FF453A'; }
      else if (val.length < 8) { fill.style.width = '50%'; fill.style.background = '#FF9F0A'; }
      else if (val.length < 12) { fill.style.width = '75%'; fill.style.background = '#86868B'; }
      else { fill.style.width = '100%'; fill.style.background = '#30D158'; }
    }
  </script>
<script src="../../shared-nav.js?v=1774781877"></script>
</body>
</html>
