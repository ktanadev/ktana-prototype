<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova senha — KTANA</title>
  <link rel="stylesheet" href="../../shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; background: #F5F5F7; }
    .container { width: 100%; max-width: 380px; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo h1 { font-family: 'Zen Dots', cursive; font-size: 20px; color: #D70030; margin-bottom: 4px; }
    .logo p { font-family: 'Satoshi', sans-serif; font-size: 13px; color: #86868B; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-family: 'Inter', sans-serif; display: block; font-size: 11px; color: #86868B; margin-bottom: 6px; font-weight: 500; }
    .input { font-family: 'Inter', sans-serif; background: #F0F0F0; border: 0.5px solid rgba(0,0,0,0.06); border-radius: 12px; padding: 12px 14px; font-size: 14px; width: 100%; outline: none; color: #1D1D1F; }
    .input:focus { border-color: rgba(215,0,48,0.3); }
    .input::placeholder { color: #AEAEB2; }
    .btn-submit { font-family: 'Inter', sans-serif; width: 100%; padding: 14px; border-radius: 12px; background: #1D1D1F; color: #F5F5F7; font-size: 14px; font-weight: 500; border: none; cursor: pointer; margin-top: 16px; }
    .strength { height: 3px; background: rgba(0,0,0,0.04); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: all 0.3s; }
  </style>
</head>
<body>
  <div class="container fade-in">
    <div class="logo"><h1>KTANA</h1><p>Crie uma nova senha</p></div>
    <form onsubmit="event.preventDefault(); location.href='login.html';">
      <div class="form-group"><label>Nova senha</label><input type="password" class="input" placeholder="Minimo 8 caracteres" required id="pwd" oninput="updateStrength(this.value)"><div class="strength"><div class="strength-fill" id="sf"></div></div></div>
      <div class="form-group"><label>Confirmar nova senha</label><input type="password" class="input" placeholder="Repita a senha" required></div>
      <button type="submit" class="btn-submit">Redefinir senha</button>
    </form>
  </div>
  <script>
    function updateStrength(v){const f=document.getElementById('sf');if(v.length<6){f.style.width='20%';f.style.background='#FF453A';}else if(v.length<8){f.style.width='50%';f.style.background='#FF9F0A';}else if(v.length<12){f.style.width='75%';f.style.background='#86868B';}else{f.style.width='100%';f.style.background='#30D158';}}
  </script>
<script src="../shared-nav.js"></script>
</body>
</html>
