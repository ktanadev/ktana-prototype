<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha — KTANA</title>
  <link rel="stylesheet" href="../../shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .container { width: 100%; max-width: 380px; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo h1 { font-size: 20px; margin-bottom: 4px; }
    .logo p { font-size: 13px; }
    .icon-wrap { text-align: center; margin-bottom: 24px; }
    .icon-wrap svg { color: #D70030; }
    h2 { font-family: 'Satoshi', sans-serif; font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 8px; color: #1D1D1F; }
    .sub { font-family: 'Satoshi', sans-serif; font-size: 14px; color: #86868B; text-align: center; line-height: 1.6; margin-bottom: 28px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-family: 'Inter', sans-serif; font-size: 11px; color: #86868B; margin-bottom: 6px; font-weight: 500; }
    .back-link { position: fixed; top: 20px; left: 24px; font-family: 'Inter', sans-serif; font-size: 12px; color: #86868B; text-decoration: none; }
    .back-link:hover { color: #1D1D1F; }
    .success-state { display: none; text-align: center; }
    .success-state.show { display: block; }
    .form-state.hide { display: none; }
    .success-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(48,209,88,0.08); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  </style>
</head>
<body class="light">
  <a href="login.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle;margin-right:4px;"><path d="M15 19l-7-7 7-7"/></svg>
    Voltar
  </a>

  <div class="container fade-in">
    <div class="logo">
      <h1 class="font-display text-brand">KTANA</h1>
      <p class="text-3">Conta Pessoal</p>
    </div>

    <!-- Form state -->
    <div class="form-state" id="formState">
      <div class="icon-wrap">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <h2>Esqueceu sua senha?</h2>
      <p class="sub">Digite seu email e enviaremos um link para redefinir sua senha.</p>

      <form onsubmit="event.preventDefault(); showSuccess();">
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="input" placeholder="voce@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:14px;border-radius:12px;">
          Enviar link de recuperacao
        </button>
      </form>

      <p style="font-family:'Inter',sans-serif;font-size:13px;color:#86868B;text-align:center;margin-top:20px;">
        Lembrou? <a href="login.html" style="color:#D70030;font-weight:500;">Fazer login</a>
      </p>
    </div>

    <!-- Success state -->
    <div class="success-state" id="successState">
      <div class="success-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#30D158" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Email enviado</h2>
      <p class="sub">Verifique sua caixa de entrada. O link expira em 15 minutos.</p>
      <button class="btn btn-primary" style="width:100%;padding:14px;font-size:14px;border-radius:12px;" onclick="location.href='login.html'">
        Voltar ao login
      </button>
    </div>
  </div>

  <script>
    function showSuccess() {
      document.getElementById('formState').classList.add('hide');
      document.getElementById('successState').classList.add('show');
    }
  </script>
</body>
</html>
