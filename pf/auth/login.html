<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — KTANA</title>
  <link rel="stylesheet" href="../../shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .login-container { width: 100%; max-width: 380px; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo h1 { font-size: 20px; margin-bottom: 4px; }
    .logo p { font-size: 13px; }
    .type-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(215,0,48,0.06); border-radius: 100px; padding: 6px 14px; font-size: 11px; font-weight: 500; color: #D70030; font-family: 'Inter', system-ui, sans-serif; margin-bottom: 24px; }
    .type-badge svg { width: 14px; height: 14px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; color: #86868B; margin-bottom: 6px; font-weight: 500; font-family: 'Inter', system-ui, sans-serif; }
    .divider { display: flex; align-items: center; gap: 16px; margin: 20px 0; }
    .divider span { font-size: 11px; color: #AEAEB2; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.06); }
    .social-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.06); background: #FFF; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px; font-weight: 500; color: #1D1D1F; cursor: pointer; transition: border-color 0.15s; font-family: inherit; }
    .social-btn:hover { border-color: #D2D2D7; }
    .social-btn + .social-btn { margin-top: 8px; }
    .forgot { font-size: 12px; color: #86868B; text-align: right; margin-top: 4px; font-family: 'Inter', system-ui, sans-serif; }
    .forgot a { color: #D70030; }
    .signup-link { font-size: 13px; color: #86868B; text-align: center; margin-top: 24px; }
    .signup-link a { color: #D70030; font-weight: 500; }
    .pj-link { font-size: 12px; color: #AEAEB2; text-align: center; margin-top: 12px; font-family: 'Inter', system-ui, sans-serif; }
    .pj-link a { color: #86868B; }
    .back-link { position: fixed; top: 20px; left: 24px; font-size: 12px; color: #86868B; text-decoration: none; font-family: 'Inter', system-ui, sans-serif; }
    .back-link:hover { color: #1D1D1F; }
  </style>
</head>
<body class="light">
  <a href="../landing.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align: middle; margin-right: 4px;"><path d="M15 19l-7-7 7-7"/></svg>
    Voltar
  </a>

  <div class="login-container fade-in">
    <div class="logo">
      <h1 class="font-display text-brand">KTANA</h1>
      <p class="text-3">Bem-vindo de volta</p>
    </div>

    <div style="text-align:center">
      <span class="type-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Conta Pessoal
      </span>
    </div>

    <!-- Social login -->
    <button class="social-btn" onclick="location.href='../dashboard.html'">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar com Google
    </button>
    <button class="social-btn" onclick="location.href='../dashboard.html'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#000"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.11 4.45-3.74 4.25z"/></svg>
      Continuar com Apple
    </button>

    <div class="divider"><span>ou</span></div>

    <!-- Form -->
    <form onsubmit="event.preventDefault(); location.href='../dashboard.html';">
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="input" placeholder="voce@email.com" required>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" class="input" placeholder="Sua senha" required>
        <p class="forgot"><a href="forgot.html">Esqueci minha senha</a></p>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; padding: 14px; font-size: 14px; border-radius: 12px;">
        Entrar
      </button>
    </form>

    <p class="signup-link">
      Nao tem conta? <a href="signup.html">Criar conta pessoal</a>
    </p>

    <p class="pj-link">
      Conta empresarial? <a href="../../pj/auth/login.html">Entrar como PJ</a>
    </p>
  </div>
</body>
</html>
