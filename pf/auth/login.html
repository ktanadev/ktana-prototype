<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — KTANA</title>
  <link rel="stylesheet" href="../../shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; background: #F5F5F7; }
    .login-container { width: 100%; max-width: 380px; }
    .logo { text-align: center; margin-bottom: 36px; }
    .logo h1 { font-family: 'Zen Dots', cursive; font-size: 20px; color: #D70030; margin-bottom: 4px; }
    .logo p { font-family: 'Satoshi', sans-serif; font-size: 13px; color: #86868B; }
    .type-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(215,0,48,0.06); border-radius: 100px; padding: 6px 14px; font-size: 11px; font-weight: 500; color: #D70030; font-family: 'Inter', sans-serif; margin-bottom: 24px; }
    .type-badge svg { width: 14px; height: 14px; }

    /* Social buttons */
    .social-btn { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(0,0,0,0.08); background: #FFF; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; color: #1D1D1F; cursor: pointer; transition: all 0.15s; min-height: 52px; }
    .social-btn:hover { border-color: rgba(0,0,0,0.15); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .social-btn:active { transform: scale(0.98); }
    .social-btn + .social-btn { margin-top: 10px; }

    .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; }
    .divider span { font-family: 'Inter', sans-serif; font-size: 11px; color: #AEAEB2; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.06); }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-family: 'Inter', sans-serif; font-size: 12px; color: #86868B; margin-bottom: 6px; font-weight: 500; }
    .form-input { font-family: 'Satoshi', sans-serif; width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(0,0,0,0.08); background: #FFF; font-size: 15px; color: #1D1D1F; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-input:focus { border-color: rgba(215,0,48,0.3); box-shadow: 0 0 0 3px rgba(215,0,48,0.04); }
    .form-input::placeholder { color: #AEAEB2; }
    .form-input.error { border-color: #FF453A; }

    /* Password field wrapper */
    .password-wrap { position: relative; }
    .password-wrap .form-input { padding-right: 48px; }
    .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #AEAEB2; padding: 4px; transition: color 0.15s; }
    .toggle-pw:hover { color: #1D1D1F; }

    /* Row between password and forgot */
    .pw-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; color: #86868B; }
    .remember input { width: 16px; height: 16px; border-radius: 4px; accent-color: #D70030; cursor: pointer; }
    .forgot a { font-family: 'Inter', sans-serif; font-size: 12px; color: #D70030; font-weight: 500; text-decoration: none; }
    .forgot a:hover { opacity: 0.7; }

    /* Submit button */
    .btn-login { font-family: 'Inter', sans-serif; width: 100%; margin-top: 24px; padding: 16px; font-size: 15px; font-weight: 500; border-radius: 14px; border: none; background: #1D1D1F; color: #F5F5F7; cursor: pointer; transition: all 0.15s; min-height: 52px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-login:hover { background: #000; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login.loading { opacity: 0.7; pointer-events: none; }

    /* Error message */
    .error-msg { font-family: 'Inter', sans-serif; font-size: 12px; color: #FF453A; margin-top: 6px; display: none; align-items: center; gap: 6px; }
    .error-msg.show { display: flex; }
    .error-msg svg { flex-shrink: 0; }

    /* Links */
    .signup-link { font-family: 'Inter', sans-serif; font-size: 13px; color: #86868B; text-align: center; margin-top: 24px; }
    .signup-link a { color: #D70030; font-weight: 500; text-decoration: none; }
    .pj-link { font-family: 'Inter', sans-serif; font-size: 12px; color: #AEAEB2; text-align: center; margin-top: 12px; }
    .pj-link a { color: #86868B; text-decoration: none; }
    .pj-link a:hover { color: #1D1D1F; }

    /* Terms */
    .terms-note { font-family: 'Inter', sans-serif; font-size: 11px; color: #AEAEB2; text-align: center; margin-top: 24px; line-height: 1.5; }
    .terms-note a { color: #86868B; text-decoration: none; }
    .terms-note a:hover { color: #D70030; }

    .back-link { position: fixed; top: 20px; left: 24px; font-family: 'Inter', sans-serif; font-size: 12px; color: #86868B; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .back-link:hover { color: #1D1D1F; }

    /* Spinner */
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #FFF; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.25,0.1,0.25,1) both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <a href="../landing.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg>
    Voltar
  </a>

  <div class="login-container fade-in">
    <div class="logo">
      <h1>KTANA</h1>
      <p>Bem-vindo de volta</p>
    </div>

    <div style="text-align:center">
      <span class="type-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Conta Pessoal
      </span>
    </div>

    <!-- Social login — primary path -->
    <button class="social-btn" onclick="socialLogin(this)">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar com Google
    </button>
    <button class="social-btn" onclick="socialLogin(this)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.11 4.45-3.74 4.25z"/></svg>
      Continuar com Apple
    </button>

    <div class="divider"><span>ou entre com email</span></div>

    <!-- Email/password form -->
    <form id="loginForm" onsubmit="event.preventDefault(); submitLogin();">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" class="form-input" id="email" placeholder="voce@email.com" required autocomplete="email">
        <div class="error-msg" id="emailError">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          Email nao encontrado
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-wrap">
          <input type="password" class="form-input" id="password" placeholder="Sua senha" required autocomplete="current-password">
          <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Mostrar senha">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="error-msg" id="pwError">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          Senha incorreta
        </div>
      </div>

      <div class="pw-row">
        <label class="remember">
          <input type="checkbox" checked> Lembrar de mim
        </label>
        <span class="forgot"><a href="forgot.html">Esqueci a senha</a></span>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        Entrar
      </button>
    </form>

    <p class="signup-link">
      Nao tem conta? <a href="signup.html">Criar conta pessoal</a>
    </p>

    <p class="pj-link">
      Conta empresarial? <a href="../../tenant/auth/login.html">Entrar como PJ</a>
    </p>

    <p class="terms-note">
      Ao entrar, voce concorda com os <a href="../../legal/terms.html">Termos de Uso</a> e <a href="../../legal/privacy.html">Politica de Privacidade</a>.
    </p>
  </div>

  <script>
    function togglePassword() {
      var pw = document.getElementById('password');
      var icon = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        pw.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function socialLogin(btn) {
      var original = btn.innerHTML;
      btn.innerHTML = '<div class="spinner"></div> Conectando...';
      btn.style.opacity = '0.7';
      btn.style.pointerEvents = 'none';
      setTimeout(function() { location.href = '../dashboard.html'; }, 1200);
    }

    function submitLogin() {
      var btn = document.getElementById('loginBtn');
      btn.classList.add('loading');
      btn.innerHTML = '<div class="spinner"></div> Entrando...';

      // Clear previous errors
      document.querySelectorAll('.error-msg').forEach(function(e) { e.classList.remove('show'); });
      document.querySelectorAll('.form-input').forEach(function(e) { e.classList.remove('error'); });

      setTimeout(function() {
        location.href = '../dashboard.html';
      }, 1000);
    }

    // Clear error on input focus
    document.querySelectorAll('.form-input').forEach(function(input) {
      input.addEventListener('focus', function() {
        this.classList.remove('error');
        var errorEl = this.parentElement.querySelector('.error-msg') || this.parentElement.parentElement.querySelector('.error-msg');
        if (errorEl) errorEl.classList.remove('show');
      });
    });
  </script>
</body>
</html>
