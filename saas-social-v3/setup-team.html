<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Montar equipe — KTANA Social</title>
  <link rel="stylesheet" href="../shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    body{min-height:100vh;background:#F5F5F7;color:#1D1D1F;display:flex;align-items:center;justify-content:center;padding:24px}
    a{text-decoration:none;color:inherit}
    .chat-card{width:100%;max-width:480px;background:#FFF;border-radius:24px;border:1px solid rgba(0,0,0,0.04);box-shadow:0 4px 40px rgba(0,0,0,0.06);overflow:hidden;position:relative}
    .chat-card::before{content:'';position:absolute;inset:0;border-radius:24px;padding:1.5px;background:linear-gradient(135deg,rgba(255,231,231,0.3) 0%,transparent 20%,rgba(215,0,48,0.25) 80%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
    .cc-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid rgba(0,0,0,0.04)}
    .cc-av{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#D70030,#8B0000);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cc-av svg{width:16px;height:16px;stroke:#FFF;fill:none;stroke-width:1.5}
    .cc-nm{font-family:'Zen Dots',cursive;font-size:12px;color:#1D1D1F}
    .cc-st{font-family:'Inter',sans-serif;font-size:12px;color:#34C759}
    .cc-body{padding:20px;display:flex;flex-direction:column;gap:12px;min-height:320px;max-height:60vh;overflow-y:auto}
    .msg{max-width:88%;padding:12px 16px;border-radius:16px;font-family:'Satoshi',sans-serif;font-size:14px;line-height:1.6;animation:fadeUp 0.3s ease}
    .msg-ai{background:#F0F0F2;color:#1D1D1F;border-bottom-left-radius:4px;align-self:flex-start}
    .msg-user{background:#D70030;color:#FFF;border-bottom-right-radius:4px;align-self:flex-end}
    .msg-ai strong{color:#D70030}
    .quick-btns{display:flex;flex-wrap:wrap;gap:6px;align-self:flex-start}
    .qb{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:8px 16px;border-radius:980px;border:1px solid rgba(0,0,0,0.08);background:#FFF;color:#1D1D1F;cursor:pointer;transition:all 0.15s}
    .qb:hover{border-color:rgba(215,0,48,0.2);color:#D70030}
    .team-summary{display:flex;flex-direction:column;gap:6px;width:100%;align-self:flex-start}
    .ts-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#FFF;border:1px solid rgba(0,0,0,0.04);border-radius:10px;font-family:'Inter',sans-serif;font-size:12px;color:#1D1D1F}
    .ts-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#D70030,#A60028);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#FFF;flex-shrink:0}
    .ts-role{margin-left:auto;font-size:12px;color:#86868B}
    .cc-input{display:flex;align-items:center;gap:10px;padding:14px 20px;border-top:1px solid rgba(0,0,0,0.04)}
    .cc-input input{flex:1;font-family:'Satoshi',sans-serif;font-size:14px;background:#F5F5F7;border:1px solid rgba(0,0,0,0.06);border-radius:14px;padding:12px 16px;outline:none;color:#1D1D1F}
    .cc-input input::placeholder{color:#AEAEB2}
    .cc-input input:focus{border-color:rgba(215,0,48,0.3)}
    .cc-send{width:36px;height:36px;border-radius:50%;background:#D70030;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0}
    .cc-send svg{width:14px;height:14px;stroke:#FFF;fill:none;stroke-width:2}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="chat-card">
  <div class="cc-header">
    <div class="cc-av"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><div class="cc-nm">Sensei</div><div class="cc-st">Montando sua equipe</div></div>
  </div>
  <div class="cc-body" id="chatBody">
    <div class="msg msg-ai">Agora vamos montar sua equipe. Eu preciso saber <strong>quem lidera cada departamento</strong> que voce ativou.<br><br>Comecando pelo <strong>Marketing</strong> — quem e o lider? Me diz o nome e cargo.</div>
  </div>
  <div class="cc-input">
    <input type="text" placeholder="Ex: Maria Silva, Social Media Senior" id="userInput" autofocus>
    <button class="cc-send" id="sendBtn"><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </div>
</div>

<script>
const body = document.getElementById('chatBody');
const input = document.getElementById('userInput');
let step = 0;
const team = [];

const flow = [
  {
    process: (val) => { team.push({name: val.split(',')[0]?.trim(), role: val.split(',')[1]?.trim() || 'Social Media', dept: 'Marketing'}); },
    reply: (val) => { const n=val.split(',')[0]?.trim(); return `<strong>${n}</strong> como lider de Marketing! Tem mais alguem no Marketing? Se sim, manda nome e cargo. Se nao:`; },
    buttons: ['Proximo departamento', 'Adicionar mais']
  },
  {
    process: (val) => { if(val !== '__skip') team.push({name: val.split(',')[0]?.trim(), role: val.split(',')[1]?.trim() || 'Membro', dept: 'Marketing'}); },
    reply: (val) => `Agora o <strong>Comercial</strong> — quem lidera? Nome e cargo.`,
  },
  {
    process: (val) => { team.push({name: val.split(',')[0]?.trim(), role: val.split(',')[1]?.trim() || 'Closer', dept: 'Comercial'}); },
    reply: (val) => { const n=val.split(',')[0]?.trim(); return `<strong>${n}</strong> no Comercial! E o <strong>Customer Success</strong> — quem cuida?`; },
  },
  {
    process: (val) => { team.push({name: val.split(',')[0]?.trim(), role: val.split(',')[1]?.trim() || 'CS Manager', dept: 'CS'}); },
    reply: (val) => `Equipe montada! Aqui o resumo:`,
    action: () => { showSummary(); }
  }
];

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + (type === 'user' ? 'msg-user' : 'msg-ai');
  div.innerHTML = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function showSummary() {
  const summary = document.createElement('div');
  summary.className = 'team-summary';
  summary.innerHTML = team.map(t =>
    `<div class="ts-item"><div class="ts-av">${t.name?.[0]||'?'}${t.name?.split(' ')[1]?.[0]||''}</div>${t.name}<span class="ts-role">${t.role} — ${t.dept}</span></div>`
  ).join('');
  body.appendChild(summary);

  setTimeout(() => {
    addMsg('Tudo certo! Agora vamos ativar seus <strong>agentes de marketing</strong>. Eles sao seus funcionarios inteligentes.', 'ai');
    setTimeout(() => {
      const btn = document.createElement('div');
      btn.className = 'quick-btns';
      btn.innerHTML = '<button class="qb" onclick="location.href=\'setup-marketing.html\'">Ativar agentes</button>';
      body.appendChild(btn);
      body.scrollTop = body.scrollHeight;
    }, 500);
  }, 800);
}

function send() {
  const val = input.value.trim();
  if (!val || step >= flow.length) return;
  addMsg(val, 'user');
  input.value = '';
  const current = flow[step];
  current.process(val);
  setTimeout(() => {
    addMsg(current.reply(val), 'ai');
    if (current.action) current.action();
    if (current.buttons) {
      const btns = document.createElement('div');
      btns.className = 'quick-btns';
      btns.innerHTML = current.buttons.map(b =>
        `<button class="qb" onclick="this.parentElement.remove();${b==='Proximo departamento'?'skipToNext()':'document.getElementById(\'userInput\').focus()'}">${b}</button>`
      ).join('');
      body.appendChild(btns);
    }
    step++;
    body.scrollTop = body.scrollHeight;
  }, 600);
}

function skipToNext() {
  flow[step]?.process('__skip');
  step++;
  if (step < flow.length) {
    addMsg(flow[step-1]?.reply('') || flow[step]?.reply(''), 'ai');
  }
}

input.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
document.getElementById('sendBtn').addEventListener('click', send);
</script>
</body>
</html>
