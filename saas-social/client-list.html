<style>
body{min-height:100vh;background:#F5F5F7;color:#1D1D1F}
a{text-decoration:none;color:inherit}
.main{max-width:760px;margin:0 auto;padding:16px 20px 100px}
h1{font-family:'Zen Dots',cursive;font-size:22px;color:#1D1D1F;margin-bottom:4px}
.sub{font-family:'Satoshi',sans-serif;font-size:13px;color:#86868B;margin-bottom:20px}
.search{font-family:'Satoshi',sans-serif;width:100%;padding:12px 16px;border-radius:14px;border:1px solid rgba(0,0,0,0.06);background:#FFF;font-size:14px;outline:none;color:#1D1D1F;margin-bottom:16px;box-sizing:border-box}
.search:focus{border-color:rgba(215,0,48,0.3)}
.search::placeholder{color:#AEAEB2}
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.f-btn{font-family:'Inter',sans-serif;font-size:10px;font-weight:500;padding:5px 12px;border-radius:980px;border:1px solid rgba(0,0,0,0.06);background:#FFF;color:#86868B;cursor:pointer;transition:all 0.15s}
.f-btn:hover{border-color:rgba(215,0,48,0.12);color:#D70030}
.f-btn.active{background:rgba(215,0,48,0.06);border-color:rgba(215,0,48,0.12);color:#D70030}
.client{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#FFF;border:1px solid rgba(0,0,0,0.04);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.client:hover{border-color:rgba(215,0,48,0.1);box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.cl-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#D70030,#A60028);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:#FFF;flex-shrink:0}
.cl-info{flex:1}
.cl-name{font-family:'Satoshi',sans-serif;font-size:13px;font-weight:500;color:#1D1D1F}
.cl-sub{font-family:'Inter',sans-serif;font-size:10px;color:#86868B}
.cl-phase{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;padding:3px 8px;border-radius:6px}
.ph1{background:rgba(0,122,255,0.08);color:#007AFF}
.ph2{background:rgba(88,86,214,0.08);color:#5856D6}
.ph3{background:rgba(255,149,0,0.08);color:#FF9500}
.ph4{background:rgba(52,199,89,0.08);color:#34C759}
.ph5{background:rgba(215,0,48,0.08);color:#D70030}
.cl-bar{width:48px;height:3px;border-radius:2px;background:#E8E8ED;overflow:hidden}
.cl-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#D70030,#FF3B60)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border:2px dashed rgba(0,0,0,0.06);border-radius:14px;font-family:'Inter',sans-serif;font-size:13px;color:#86868B;cursor:pointer;transition:all 0.15s;margin-top:8px}
.add-btn:hover{border-color:rgba(215,0,48,0.12);color:#D70030}
.add-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5}
</style>
</head>
