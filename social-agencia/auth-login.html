<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KTANA — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Dots&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --brand:      #D70030;
      --brand-dark: #A60028;
      --black:      #0A0A0A;
      --dark:       #1D1D1F;
      --gray:       #6E6E73;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fundo com gradiente sutil */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 20% 20%, rgba(215,0,48,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 80% 80%, rgba(166,0,40,0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fade-in { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes glow-subtle { 0%,100% { box-shadow: 0 0 40px rgba(215,0,48,0.15); } 50% { box-shadow: 0 0 60px rgba(215,0,48,0.25); } }

    .auth-wrapper {
      width: 100%;
      max-width: 440px;
      padding: 24px;
      animation: fade-in 0.6s ease forwards;
    }

    /* Logo acima do card */
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo-text {
      font-family: 'Zen Dots', sans-serif;
      font-size: 28px;
      color: var(--brand);
      letter-spacing: 0.05em;
    }
    .auth-logo-sub {
      font-size: 12px;
      color: var(--gray);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    /* Card container com gradient border — replica AuthCard.tsx */
    .auth-card-border {
      padding: 1px;
      border-radius: 20px;
      background: linear-gradient(135deg, #D70030 0%, #A60028 50%, #3D3D3D 100%);
      animation: glow-subtle 4s ease-in-out infinite;
    }

    .auth-card {
      background: var(--dark);
      border-radius: 19px;
      padding: 36px 32px;
    }

    .auth-title {
      font-size: 24px;
      font-weight: 600;
      text-align: center;
      color: #fff;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      font-size: 13px;
      color: #8D8D8D;
      text-align: center;
      margin-bottom: 28px;
    }

    /* OAuth button */
    .oauth-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 48px;
      background: #1D1D1F;
      border: 1px solid #3D3D3D;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Inter', sans-serif;
    }
    .oauth-btn:hover {
      border-color: var(--brand);
      background: #2D2D2D;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider-line { flex: 1; height: 1px; background: #2D2D2D; }
    .divider-text { font-size: 12px; color: #5D5D5D; }

    /* Form inputs — replica login/page.tsx */
    .input-field {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      background: #0A0A0A;
      border: 1px solid #2D2D2D;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s ease;
    }
    .input-field::placeholder { color: #5D5D5D; }
    .input-field:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(215,0,48,0.15);
    }

    .input-wrap-pwd {
      position: relative;
    }
    .input-wrap-pwd .input-field {
      padding-right: 48px;
    }
    .pwd-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #5D5D5D;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .pwd-toggle:hover { color: #fff; }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #8D8D8D;
      text-decoration: none;
      margin-top: 8px;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--brand); }

    /* Submit button */
    .submit-btn {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      background: linear-gradient(135deg, #D70030, #A60028);
      transition: all 0.3s cubic-bezier(.32,.72,0,1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }
    .submit-btn:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 0 24px rgba(215,0,48,0.3);
    }
    .submit-btn:active:not(:disabled) { transform: scale(0.98); }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    /* Footer link */
    .auth-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: #5D5D5D;
    }
    .auth-footer a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }

    /* Error state */
    .error-banner {
      display: none;
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #FF3B30;
      margin-bottom: 16px;
    }
    .error-banner.show { display: flex; align-items: center; gap: 8px; }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-text">KTANA</div>
      <div class="auth-logo-sub">Pipeline de Conteúdo com IA</div>
    </div>

    <!-- Card com gradient border — replica AuthCard.tsx -->
    <div class="auth-card-border">
      <div class="auth-card">

        <!-- Título e subtítulo — replica AuthCard props -->
        <h1 class="auth-title">Bem-vindo de volta</h1>
        <p class="auth-subtitle">Acesse sua agência</p>

        <!-- Error banner (oculto por padrão) -->
        <div class="error-banner" id="error-banner">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="error-msg">Email ou senha incorretos</span>
        </div>

        <!-- OAuthButtons.tsx -->
        <div>
          <button class="oauth-btn" onclick="void 0">
            <!-- Google SVG colorido — replica OAuthButtons.tsx exatamente -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continuar com Google
          </button>
        </div>

        <!-- Divider "ou" -->
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">ou</span>
          <div class="divider-line"></div>
        </div>

        <!-- Form — replica login/page.tsx exatamente -->
        <form id="login-form" onsubmit="handleSubmit(event)" style="display:flex; flex-direction:column; gap:16px;">

          <!-- Email input -->
          <div>
            <input
              id="email"
              type="email"
              placeholder="seu@email.com"
              required
              autocomplete="email"
              class="input-field"
            />
          </div>

          <!-- Password input com toggle -->
          <div class="input-wrap-pwd">
            <input
              id="password"
              type="password"
              placeholder="Senha"
              required
              autocomplete="current-password"
              class="input-field"
            />
            <button type="button" class="pwd-toggle" onclick="togglePassword()" id="pwd-btn" aria-label="Mostrar senha">
              <!-- Eye icon (visível) -->
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (oculto) -->
              <svg id="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>

          <!-- Esqueci minha senha — replica link do page.tsx -->
          <div style="display:flex; justify-content:flex-end; margin-top:-8px;">
            <a href="#" class="forgot-link">Esqueci minha senha</a>
          </div>

          <!-- Submit button — replica exatamente com estados -->
          <button type="submit" class="submit-btn" id="submit-btn">
            <span id="btn-label">Entrar</span>
          </button>

        </form>

        <!-- Footer link — replica footer do page.tsx -->
        <p class="auth-footer">
          Não tem conta?
          <a href="#">Criar agência</a>
        </p>

      </div>
    </div>

    <!-- Texto de rodapé extra -->
    <p style="text-align:center; font-size:11px; color: #3D3D3D; margin-top:24px;">
      Ao entrar, você concorda com os <a href="#" style="color:#5D5D5D; text-decoration:none;">Termos de Uso</a> e <a href="#" style="color:#5D5D5D; text-decoration:none;">Política de Privacidade</a>
    </p>

  </div>

  <script>
    let isLoading = false;

    function togglePassword() {
      const input = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      const eyeOffIcon = document.getElementById('eye-off-icon');
      if (input.type === 'password') {
        input.type = 'text';
        eyeIcon.style.display = 'none';
        eyeOffIcon.style.display = 'block';
      } else {
        input.type = 'password';
        eyeIcon.style.display = 'block';
        eyeOffIcon.style.display = 'none';
      }
    }

    async function handleSubmit(e) {
      e.preventDefault();
      if (isLoading) return;
      isLoading = true;

      const btn = document.getElementById('submit-btn');
      const label = document.getElementById('btn-label');
      const errorBanner = document.getElementById('error-banner');

      // Esconde erro anterior
      errorBanner.classList.remove('show');

      // Estado de loading — replica exatamente o spinner do page.tsx
      btn.disabled = true;
      label.innerHTML = `
        <div class="spinner"></div>
        Entrando...
      `;

      // Simula request (1s) — replica handleSubmit do page.tsx
      await new Promise(r => setTimeout(r, 1500));

      // Simula resposta — demo mostra erro para qualquer senha
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (email === 'rafael@ktana.ai' && password === '123456') {
        // Sucesso
        label.innerHTML = '✓ Bem-vindo, Rafael!';
        btn.style.background = 'linear-gradient(135deg, #30D158, #22a84a)';
      } else {
        // Erro
        btn.disabled = false;
        label.innerHTML = 'Entrar';
        document.getElementById('error-msg').textContent = 'Email ou senha incorretos. Tente rafael@ktana.ai / 123456';
        errorBanner.classList.add('show');
      }

      isLoading = false;
    }
  </script>
</body>
</html>
